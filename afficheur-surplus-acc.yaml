# ============================================================================
# ACC SURPLUS DISPLAY – ESPHome Configuration
# ============================================================================
#
# Project: Display photovoltaic surplus for a neighbour in a Collective Self‑Consumption (ACC) setup
# Hardware: Heltec Vision Master T190 (ESP32-S3, ST7789 1.9" display)
# Communication: MQTTS (TLS) to remote broker
#
# Features:
# - WiFi configuration via captive portal (neighbour sets his own network)
# - Secure MQTTS connection to your broker
# - Instant surplus value (W) with colour coding based on power level
# - 12‑hour history graph for PV and surplus (1 point per minute)
# - Total PV power and daily injected energy
# - Large clock (HH:MM) with outdoor temperature and humidity
# - Configurable page switching durations
# - Backlight brightness control via Home Assistant entity
# - WiFi signal strength (bars or SSID, alternating)
# - MQTT connection indicator (green / red)
#
# All user‑configurable parameters are in the `substitutions` section.
# ============================================================================

# ============================================================================
# USER CONFIGURABLE PARAMETERS – EDIT HERE AS NEEDED
# ============================================================================
substitutions:
  # --- Display durations (seconds) ---
  page_duration_main: "8"      # Main data page duration
  page_duration_clock: "4"     # Clock page duration
  wifi_display_interval: "4"   # Switch between SSID / WiFi bars every X seconds

  # --- MQTT topics (must match those published by Home Assistant) ---
  topic_surplus: "tele/surplus/etat"
  topic_pv_total: "tele/pv_total/etat"
  topic_injection: "tele/injection_affichage/etat"

  # --- Colour thresholds for surplus value (W) ---
  threshold_yellow: "100"   # < 100 W → yellow
  threshold_green: "500"    # < 500 W → green
  threshold_orange: "1500"  # < 1500 W → orange
  # Above → red

  # --- COLOURS (use Color(r,g,b) with r,g,b from 0 to 255) ---
  # Basic colours
  color_background: "Color(0,0,0)"       # Black background
  color_text_white: "Color(255,255,255)" # White text
  color_text_gray: "Color(200,200,200)"  # Light gray
  color_surplus_yellow: "Color(255,255,0)"   # Yellow
  color_surplus_green: "Color(0,255,0)"      # Green
  color_surplus_orange: "Color(255,165,0)"   # Orange
  color_surplus_red: "Color(255,0,0)"        # Red
  color_graph_frame: "Color(255,255,255)"   # White frame
  color_legend_pv: "Color(0,255,255)"       # Cyan for PV legend
  color_legend_surplus: "Color(255,255,0)"  # Yellow for surplus legend
  color_curve_pv: "Color(0,255,255)"        # Cyan for PV curve
  color_curve_surplus: "Color(255,255,0)"   # Yellow for surplus curve
  color_text_s15min: "Color(0,255,255)"     # Cyan for 15‑min average text
  color_text_energy: "Color(0,255,255)"     # Cyan for daily energy text
  color_mqtt_online: "Color(0,255,0)"       # Green for MQTT connected
  color_mqtt_offline: "Color(255,0,0)"      # Red for MQTT disconnected
  color_wifi_text: "Color(255,255,255)"     # White for WiFi text
  color_wifi_bars: "Color(255,255,255)"     # White for WiFi bars
  color_pv_label: "Color(200,200,200)"      # Light gray for PV label
  color_pv_value: "Color(0,255,255)"        # Cyan for PV value
  color_time: "Color(0,255,255)"            # Cyan for clock
  color_weather: "Color(255,255,255)"       # White for weather text

  # --- Coordinates and sizes (pixels) ---
  time_x: "60"
  time_y: "35"
  time_font_size: "70"

  weather_x: "60"
  weather_y: "120"
  weather_font_size: "16"

  graph_x: "5"
  graph_y: "37"
  graph_width: "314"
  graph_height: "110"
  legend_top_offset: "12"
  legend_square_size: "6"
  legend_spacing: "18"

  mqtt_indicator_x: "8"
  mqtt_indicator_y_offset: "10"
  mqtt_indicator_radius: "4"

  pv_current_x: "170"
  pv_current_y_bottom_offset: "5"

  surplus_title_x: "5"
  surplus_title_y: "0"
  surplus_value_x: "200"
  surplus_value_y: "-8"
  surplus_unit_x: "298"
  surplus_unit_y: "12"

  # --- Font sizes ---
  font_big_size: "45"
  font_small_size: "16"
  font_huge_size: "70"

  # --- ESP32 pins (Heltec Vision Master T190) ---
  pin_vtft_enable: "GPIO7"
  pin_backlight: "GPIO17"
  pin_spi_clk: "GPIO38"
  pin_spi_mosi: "GPIO48"
  pin_display_cs: "GPIO39"
  pin_display_dc: "GPIO47"
  pin_display_reset: "GPIO40"

